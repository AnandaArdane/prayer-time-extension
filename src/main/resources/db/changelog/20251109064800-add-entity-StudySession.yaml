databaseChangeLog:
  - changeSet:
      id: 20251109064900-1
      author: nanda
      changes:
        - createSequence:
            sequenceName: study_session_seq
            startValue: 1
            incrementBy: 1

  - changeSet:
      id: 20251111122400-1
      author: nanda
      changes:
        - createTable:
            tableName: study_session
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: place
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

  - changeSet:
      id: 20251109070600-1
      author: nanda
      changes:
        - addDefaultValue:
            tableName: study_session
            columnName: id
            defaultValueSequenceNext: study_session_seq
